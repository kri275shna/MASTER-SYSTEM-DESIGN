version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: purplle-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: store_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: purplle-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: purplle-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/store_intelligence
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=purplle-super-secret-key-change-in-production-12345
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: purplle-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
